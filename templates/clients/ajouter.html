{% extends 'base.html' %}
{% block title %}Ajouter un Client{% endblock %}
{% block page_title %}👥 Ajouter un Client{% endblock %}

{% block content %}
<div class="card shadow-sm" style="max-width:600px; margin:auto;">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0">➕ Ajouter un Client</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nom</label>
                <input type="text" name="nom" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Prénom</label>
                <input type="text" name="prenom" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Téléphone</label>
                <input type="text" name="telephone" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">CIN</label>
                <input type="text" name="cin" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Type de Société</label>
                <select name="type_societe" class="form-select" required>
                    <option value="">-- Choisir --</option>
                    <option value="SARL">SARL</option>
                    <option value="SAS">SAS</option>
                    <option value="Auto-entrepreneur">Auto-entrepreneur</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">✅ Enregistrer</button>
        </form>
    </div>
</div>
<a href="{% url 'liste_clients' %}" class="btn btn-secondary mt-3">⬅️ Retour</a>
{% endblock %}
