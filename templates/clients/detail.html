<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail Client</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card shadow" style="max-width: 600px; margin: auto;">
        <div class="card-header bg-info text-white">
            <h4>👤 Détail du Client</h4>
        </div>
        <div class="card-body">
            <table class="table">
                <tr>
                    <th>Nom complet</th>
                    <td>{{ client.nom }} {{ client.prenom }}</td>
                </tr>
                <tr>
                    <th>Email</th>
                    <td>{{ client.email }}</td>
                </tr>
                <tr>
                    <th>Téléphone</th>
                    <td>{{ client.telephone }}</td>
                </tr>
                <tr>
                    <th>CIN</th>
                    <td>{{ client.cin }}</td>
                </tr>
                <tr>
                    <th>Type Société</th>
                    <td>{{ client.type_societe }}</td>
                </tr>
                <tr>
                    <th>Date inscription</th>
                    <td>{{ client.date_inscription|date:"d/m/Y" }}</td>
                </tr>
            </table>
            <a href="{% url 'modifier_client' client.pk %}" 
               class="btn btn-warning">✏️ Modifier</a>
            <a href="{% url 'liste_clients' %}" 
               class="btn btn-secondary">⬅️ Retour</a>
        </div>
    </div>
</div>
</body>
</html>
