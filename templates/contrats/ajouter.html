{% extends 'base.html' %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Contrat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card shadow" style="max-width:600px; margin:auto;">
        <div class="card-header bg-success text-white">
            <h4>➕ Ajouter un Contrat</h4>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Client</label>
                    <select name="client" class="form-select" required>
                        <option value="">-- Choisir --</option>
                        {% for client in clients %}
                        <option value="{{ client.pk }}">{{ client.nom }} {{ client.prenom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Numéro de contrat</label>
                    <input type="text" name="numero" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Pack</label>
                    <select name="pack" class="form-select" required>
                        <option value="">-- Choisir --</option>
                        <option value="standard">Standard - 3000 DH</option>
                        <option value="premium">Premium - 3900 DH</option>
                        <option value="premium_plus">Premium+ - 4990 DH</option>
                        <option value="domiciliation">Domiciliation seule - 2000 DH</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date début</label>
                    <input type="date" name="date_debut" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Date fin</label>
                    <input type="date" name="date_fin" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Statut</label>
                    <select name="statut" class="form-select" required>
                        <option value="en_attente">En attente</option>
                        <option value="actif">Actif</option>
                        <option value="expire">Expiré</option>
                        <option value="resilie">Résilié</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Adresse domiciliation</label>
                    <textarea name="adresse_domiciliation" class="form-control" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100">✅ Enregistrer</button>
            </form>
        </div>
    </div>
    <a href="{% url 'liste_contrats' %}" class="btn btn-secondary mt-3">⬅️ Retour</a>
</div>
</body>
</html>
