<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail Contrat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card shadow" style="max-width:600px; margin:auto;">
        <div class="card-header bg-info text-white">
            <h4>📄 Détail du Contrat</h4>
        </div>
        <div class="card-body">
            <table class="table">
                <tr><th>Numéro</th><td>{{ contrat.numero }}</td></tr>
                <tr><th>Client</th><td>{{ contrat.client }}</td></tr>
                <tr><th>Pack</th><td>{{ contrat.pack }}</td></tr>
                <tr><th>Date début</th><td>{{ contrat.date_debut|date:"d/m/Y" }}</td></tr>
                <tr><th>Date fin</th><td>{{ contrat.date_fin|date:"d/m/Y" }}</td></tr>
                <tr><th>Statut</th><td>{{ contrat.statut }}</td></tr>
                <tr><th>Adresse</th><td>{{ contrat.adresse_domiciliation }}</td></tr>
            </table>
            <a href="{% url 'modifier_contrat' contrat.pk %}" class="btn btn-warning">✏️ Modifier</a>
            <a href="{% url 'liste_contrats' %}" class="btn btn-secondary">⬅️ Retour</a>
        </div>
    </div>
</div>
</body>
</html>
