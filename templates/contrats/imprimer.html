<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrats - Domicohouse</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        h1 { color: #1a3c5e; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: #1a3c5e; color: white; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #ddd; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn-print { 
            display: block; margin: 20px auto; padding: 10px 30px;
            background: #1a3c5e; color: white; border: none; 
            cursor: pointer; font-size: 16px; border-radius: 5px;
        }
        @media print {
            .btn-print { display: none; }
        }
    </style>
</head>
<body>
    <h1>🏢 Liste des Contrats - Domicohouse</h1>
    <button class="btn-print" onclick="window.print()">🖨️ Imprimer / Sauvegarder PDF</button>
    <table>
        <thead>
            <tr>
                <th>Numéro</th>
                <th>Client</th>
                <th>Pack</th>
                <th>Date début</th>
                <th>Date fin</th>
                <th>Statut</th>
            </tr>
        </thead>
        <tbody>
            {% for contrat in contrats %}
            <tr>
                <td>{{ contrat.numero }}</td>
                <td>{{ contrat.client }}</td>
                <td>{{ contrat.pack }}</td>
                <td>{{ contrat.date_debut|date:"d/m/Y" }}</td>
                <td>{{ contrat.date_fin|date:"d/m/Y" }}</td>
                <td>{{ contrat.statut }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <script>
        window.onload = function() { window.print(); }
    </script>
</body>
</html>
