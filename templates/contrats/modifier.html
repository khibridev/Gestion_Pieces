{% extends 'base.html' %}
{% block title %}Modifier un Contrat{% endblock %}
{% block page_title %}📄 Modifier un Contrat{% endblock %}

{% block content %}
<div class="card shadow-sm" style="max-width:600px; margin:auto;">
    <div class="card-header bg-warning">
        <h5 class="mb-0">✏️ Modifier le Contrat</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Client</label>
                <select name="client" class="form-select" required>
                    {% for client in clients %}
                    <option value="{{ client.pk }}" {% if contrat.client.pk == client.pk %}selected{% endif %}>
                        {{ client.nom }} {{ client.prenom }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Numéro de contrat</label>
                <input type="text" name="numero" class="form-control" value="{{ contrat.numero }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Pack</label>
                <select name="pack" class="form-select" required>
                    <option value="standard" {% if contrat.pack == 'standard' %}selected{% endif %}>Standard - 3000 DH</option>
                    <option value="premium" {% if contrat.pack == 'premium' %}selected{% endif %}>Premium - 3900 DH</option>
                    <option value="premium_plus" {% if contrat.pack == 'premium_plus' %}selected{% endif %}>Premium+ - 4990 DH</option>
                    <option value="domiciliation" {% if contrat.pack == 'domiciliation' %}selected{% endif %}>Domiciliation seule - 2000 DH</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Date début</label>
                <input type="date" name="date_debut" class="form-control" value="{{ contrat.date_debut|date:'Y-m-d' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date fin</label>
                <input type="date" name="date_fin" class="form-control" value="{{ contrat.date_fin|date:'Y-m-d' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Statut</label>
                <select name="statut" class="form-select" required>
                    <option value="en_attente" {% if contrat.statut == 'en_attente' %}selected{% endif %}>En attente</option>
                    <option value="actif" {% if contrat.statut == 'actif' %}selected{% endif %}>Actif</option>
                    <option value="expire" {% if contrat.statut == 'expire' %}selected{% endif %}>Expiré</option>
                    <option value="resilie" {% if contrat.statut == 'resilie' %}selected{% endif %}>Résilié</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Adresse domiciliation</label>
                <textarea name="adresse_domiciliation" class="form-control" rows="3" required>{{ contrat.adresse_domiciliation }}</textarea>
            </div>
            <button type="submit" class="btn btn-warning w-100">💾 Enregistrer</button>
        </form>
    </div>
</div>
<a href="{% url 'liste_contrats' %}" class="btn btn-secondary mt-3">⬅️ Retour</a>
{% endblock %}
