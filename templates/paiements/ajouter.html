{% extends 'base.html' %}
{% block title %}Ajouter un Paiement{% endblock %}
{% block page_title %}💰 Ajouter un Paiement{% endblock %}

{% block content %}
<div class="card shadow-sm" style="max-width:600px; margin:auto;">
    <div class="card-header bg-success text-white">
        <h5 class="mb-0">➕ Ajouter un Paiement</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Contrat</label>
                <select name="contrat" class="form-select" required>
                    <option value="">-- Choisir --</option>
                    {% for contrat in contrats %}
                    <option value="{{ contrat.pk }}">{{ contrat.numero }} - {{ contrat.client }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Montant (DH)</label>
                <input type="number" name="montant" class="form-control" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date de paiement</label>
                <input type="date" name="date_paiement" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mode de paiement</label>
                <select name="mode" class="form-select" required>
                    <option value="">-- Choisir --</option>
                    <option value="virement">Virement bancaire</option>
                    <option value="especes">Espèces</option>
                    <option value="cheque">Chèque</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Statut</label>
                <select name="statut" class="form-select" required>
                    <option value="en_attente">En attente</option>
                    <option value="paye">Payé</option>
                    <option value="impaye">Impayé</option>
                </select>
            </div>
            <button type="submit" class="btn btn-success w-100">✅ Enregistrer</button>
        </form>
    </div>
</div>
<a href="{% url 'liste_paiements' %}" class="btn btn-secondary mt-3">⬅️ Retour</a>
{% endblock %}
