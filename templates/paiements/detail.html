<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Détail Paiement</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <div class="card shadow" style="max-width:600px; margin:auto;">
        <div class="card-header bg-info text-white">
            <h4>💰 Détail du Paiement</h4>
        </div>
        <div class="card-body">
            <table class="table">
                <tr><th>Contrat</th><td>{{ paiement.contrat.numero }}</td></tr>
                <tr><th>Client</th><td>{{ paiement.contrat.client }}</td></tr>
                <tr><th>Montant</th><td>{{ paiement.montant }} DH</td></tr>
                <tr><th>Date</th><td>{{ paiement.date_paiement|date:"d/m/Y" }}</td></tr>
                <tr><th>Mode</th><td>{{ paiement.mode }}</td></tr>
                <tr><th>Statut</th><td>{{ paiement.statut }}</td></tr>
            </table>
            <a href="{% url 'modifier_paiement' paiement.pk %}" class="btn btn-warning">✏️ Modifier</a>
            <a href="{% url 'liste_paiements' %}" class="btn btn-secondary">⬅️ Retour</a>
        </div>
    </div>
</div>
</body>
</html>
