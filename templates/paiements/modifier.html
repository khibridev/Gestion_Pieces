{% extends 'base.html' %}
{% block title %}Modifier un Paiement{% endblock %}
{% block page_title %}💰 Modifier un Paiement{% endblock %}

{% block content %}
<div class="card shadow-sm" style="max-width:600px; margin:auto;">
    <div class="card-header bg-warning">
        <h5 class="mb-0">✏️ Modifier le Paiement</h5>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Contrat</label>
                <select name="contrat" class="form-select" required>
                    {% for contrat in contrats %}
                    <option value="{{ contrat.pk }}" {% if paiement.contrat.pk == contrat.pk %}selected{% endif %}>
                        {{ contrat.numero }} - {{ contrat.client }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Montant (DH)</label>
                <input type="number" name="montant" class="form-control" value="{{ paiement.montant }}" step="0.01" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Date de paiement</label>
                <input type="date" name="date_paiement" class="form-control" value="{{ paiement.date_paiement|date:'Y-m-d' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mode de paiement</label>
                <select name="mode" class="form-select" required>
                    <option value="virement" {% if paiement.mode == 'virement' %}selected{% endif %}>Virement bancaire</option>
                    <option value="especes" {% if paiement.mode == 'especes' %}selected{% endif %}>Espèces</option>
                    <option value="cheque" {% if paiement.mode == 'cheque' %}selected{% endif %}>Chèque</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Statut</label>
                <select name="statut" class="form-select" required>
                    <option value="en_attente" {% if paiement.statut == 'en_attente' %}selected{% endif %}>En attente</option>
                    <option value="paye" {% if paiement.statut == 'paye' %}selected{% endif %}>Payé</option>
                    <option value="impaye" {% if paiement.statut == 'impaye' %}selected{% endif %}>Impayé</option>
                </select>
            </div>
            <button type="submit" class="btn btn-warning w-100">💾 Enregistrer</button>
        </form>
    </div>
</div>
<a href="{% url 'liste_paiements' %}" class="btn btn-secondary mt-3">⬅️ Retour</a>
{% endblock %}
