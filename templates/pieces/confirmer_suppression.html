{% extends 'pieces/base.html' %}
{% block content %}
<div class="page-header">
    <h1><i class="bi bi-trash me-2 text-danger"></i>Supprimer la pièce</h1>
</div>
<div class="col-md-6">
    <div class="card border-danger">
        <div class="card-body text-center py-4">
            <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem"></i>
            <h5 class="mt-3">Confirmer la suppression</h5>
            <p class="text-muted">Voulez-vous supprimer la pièce <strong>{{ piece.reference }} - {{ piece.description }}</strong> ?</p>
            <p class="text-danger small">Cette action est irréversible.</p>
            <form method="post" class="d-flex gap-2 justify-content-center">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Oui, supprimer</button>
                <a href="/pieces/" class="btn btn-outline-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
