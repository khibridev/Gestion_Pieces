<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — Gestion des Pièces</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            width: 70px; height: 70px; background: linear-gradient(135deg, #f5c518, #e6a800);
            border-radius: 18px; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 20px; font-size: 2rem;
        }
        .login-title { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; text-align: center; }
        .login-subtitle { color: #888; text-align: center; font-size: 0.9rem; margin-bottom: 30px; }
        .form-control { border-radius: 10px; padding: 12px 15px; border: 2px solid #eee; }
        .form-control:focus { border-color: #f5c518; box-shadow: 0 0 0 3px rgba(245,197,24,0.15); }
        .btn-login {
            background: linear-gradient(135deg, #f5c518, #e6a800);
            border: none; border-radius: 10px; padding: 12px;
            font-weight: 700; color: #1a1a2e; width: 100%; font-size: 1rem;
        }
        .btn-login:hover { background: linear-gradient(135deg, #e6a800, #cc9500); color: #1a1a2e; }
        .input-group-text { border-radius: 10px 0 0 10px; background: #f8f9fa; border: 2px solid #eee; border-right: none; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">⚙️</div>
    <div class="login-title">Gestion des Pièces</div>
    <div class="login-subtitle">Connectez-vous pour accéder à l'application</div>

    {% if form.errors %}
    <div class="alert alert-danger rounded-3 py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>
        Identifiants incorrects. Réessayez.
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold small">Nom d'utilisateur</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="admin" autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold small">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••">
            </div>
        </div>
        <button type="submit" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
    </form>
</div>
</body>
</html>
