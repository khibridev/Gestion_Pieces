{% extends 'pieces/base.html' %}
{% block content %}
<div class="col-md-5">
    <div class="card border-danger">
        <div class="card-body text-center py-4">
            <i class="bi bi-person-x text-danger" style="font-size:3rem"></i>
            <h5 class="mt-3">Supprimer l'utilisateur</h5>
            <p class="text-muted">Supprimer <strong>{{ u.username }}</strong> ?</p>
            <form method="post" class="d-flex gap-2 justify-content-center">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger">Oui, supprimer</button>
                <a href="/utilisateurs/" class="btn btn-outline-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
